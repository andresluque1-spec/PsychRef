    redFlags: ["Prior antidepressant-induced hypomania/mania","Rapid cycling (≥4 episodes/year)","Psychotic features during mood episodes","Strong family history","Treatment resistance on antidepressants alone"],
  },
  {
    id: "psychosis", name: "Psychotic Spectrum", dsm: "DSM-5 295.xx / 297.1",
    criteria: "Schizophrenia: ≥2 of 5 symptoms (delusions, hallucinations, disorganized speech, disorganized behavior, negative symptoms) for ≥1 month, with ≥6 months of prodromal/residual symptoms",
    domains: [
      { name: "Positive Symptoms", questions: ["Have you ever heard voices or sounds that others around you couldn't hear?","Have you seen things others couldn't see?","Have you had experiences through other senses — smells, tastes, physical sensations — that seemed unusual?","Have you had thoughts or beliefs others found strange or hard to understand?","Have you ever felt that events on TV, radio, or in the environment had special meaning for you personally?","Have you ever felt that someone was following you, watching you, or trying to harm you?","Have you felt that your thoughts were being inserted into your mind, removed, or broadcast to others?","Have you felt that external forces were controlling your thoughts, feelings, or actions?"] },
      { name: "Negative Symptoms", questions: ["Have you noticed a decrease in your emotional expressiveness — feeling flat, numb, or detached?","Have you had difficulty speaking or finding words (alogia)?","Have you had very little motivation to do things, even things you care about (avolition)?","Have you been withdrawing socially or losing interest in relationships?","Have you noticed difficulty feeling pleasure?"] },
      { name: "Disorganization", questions: ["Do people have trouble following your train of thought or understanding what you're saying?","Have you noticed your thoughts jumping around or not connecting logically?","Have you had difficulty organizing your behavior or taking care of yourself?"] },
      { name: "Timeline & Context", questions: ["When did you first start noticing these experiences?","Have these experiences been continuous or episodic?","Have you been hospitalized? What for?","Are you currently on any medications? Have you been on antipsychotics before?","Have you used any substances — cannabis, stimulants, hallucinogens? (Cannabis use disorder significantly worsens psychosis prognosis)"] },
    ],
    differentials: ["Substance-induced psychosis (esp. cannabis, stimulants)","Bipolar disorder with psychotic features","MDD with psychotic features","Brief Psychotic Disorder (<1 month)","Delusional Disorder","Medical causes (encephalitis, delirium, CNS pathology)","Schizoaffective Disorder"],
    redFlags: ["First episode — full medical workup mandatory (CBC, CMP, TSH, RPR, HIV, B12, urine tox, brain imaging)","Rapid onset in older adult (organic until proven otherwise)","Associated fever or altered consciousness (autoimmune encephalitis)","Prominent mood episodes alongside psychosis (schizoaffective vs. mood disorder with psychosis)"],
  },

function MedCard({ med, onClose }) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(10,14,23,0.9)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}} onClick={onClose}>
      <div style={{background:"#0f1724",border:"1px solid #1e293b",borderRadius:"16px",maxWidth:"720px",width:"100%",maxHeight:"90vh",overflowY:"auto",padding:"32px"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"24px"}}>
          <div>
            <h2 style={{color:"#e2e8f0",fontSize:"1.5rem",fontWeight:700,margin:0}}>{med.name}</h2>
            <div style={{color:"#64748b",fontSize:"0.875rem",marginTop:"4px"}}>{med.brand} · <span style={{color:"#38bdf8"}}>{med.class}</span></div>
          </div>
          <button onClick={onClose} style={{background:"#1e293b",border:"none",color:"#94a3b8",borderRadius:"8px",padding:"8px 12px",cursor:"pointer",fontSize:"0.875rem"}}>✕ Close</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"12px",marginBottom:"24px"}}>
          {[["Dosing",med.dosing],["Half-Life",med.halfLife],["Pregnancy",med.pregnancy]].map(([label,val])=>(
            <div key={label} style={{background:"#0a0e17",border:"1px solid #1e293b",borderRadius:"10px",padding:"12px"}}>
              <div style={{color:"#64748b",fontSize:"0.7rem",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"4px"}}>{label}</div>
              <div style={{color:"#cbd5e1",fontSize:"0.8rem",lineHeight:1.5}}>{val}</div>
            </div>
          ))}
        </div>
        {[["FDA-Approved Uses",med.fdaUses,"#22c55e"],["Off-Label Uses",med.offLabel,"#a78bfa"],["Side Effects",med.sideEffects,"#f59e0b"],["Drug Interactions",med.interactions,"#f87171"]].map(([title,items,color])=>(
          <div key={title} style={{marginBottom:"20px"}}>
            <div style={{color,fontSize:"0.75rem",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600,marginBottom:"10px"}}>{title}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
              {items.map(item=>(
                <span key={item} style={{background:`${color}15`,border:`1px solid ${color}30`,color:"#cbd5e1",borderRadius:"6px",padding:"3px 10px",fontSize:"0.8rem"}}>{item}</span>
              ))}
            </div>
          </div>
        ))}
        <div style={{background:"#1e1a0a",border:"1px solid #92400e40",borderRadius:"10px",padding:"16px"}}>
          <div style={{color:"#f59e0b",fontSize:"0.75rem",textTransform:"uppercase",letterSpacing:"0.08em",fontWeight:600,marginBottom:"8px"}}>⚠ Safety & Clinical Notes</div>
          <div style={{color:"#cbd5e1",fontSize:"0.85rem",lineHeight:1.7}}>{med.safety}</div>
        </div>
      </div>
    </div>
  );
}

function MedicationsModule() {
  const [search, setSearch] = useState("");
  const [classFilter, setClassFilter] = useState("All");
  const [selected, setSelected] = useState(null);
  const classes = ["All",...Array.from(new Set(MEDICATIONS.map(m=>m.class)))];
  const filtered = useMemo(()=>{
    const q=search.toLowerCase();
    return MEDICATIONS.filter(m=>{
      const matchSearch=!q||m.name.toLowerCase().includes(q)||m.brand.toLowerCase().includes(q)||m.class.toLowerCase().includes(q)||m.fdaUses.some(u=>u.toLowerCase().includes(q))||m.offLabel.some(u=>u.toLowerCase().includes(q))||m.sideEffects.some(s=>s.toLowerCase().includes(q));
      const matchClass=classFilter==="All"||m.class===classFilter;
      return matchSearch&&matchClass;
    });
  },[search,classFilter]);
  return (
    <div>
      <div style={{marginBottom:"24px"}}>
        <div style={{position:"relative",marginBottom:"12px"}}>
          <div style={{position:"absolute",left:"14px",top:"50%",transform:"translateY(-50%)",color:"#475569"}}><SearchIcon/></div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, class, indication, or side effect..."
            style={{width:"100%",background:"#0a0e17",border:"1px solid #1e293b",borderRadius:"10px",padding:"12px 12px 12px 44px",color:"#e2e8f0",fontSize:"0.9rem",outline:"none",boxSizing:"border-box"}}/>
        </div>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
          {classes.map(c=>(
            <button key={c} onClick={()=>setClassFilter(c)}
              style={{background:classFilter===c?"#0ea5e9":"#0a0e17",border:`1px solid ${classFilter===c?"#0ea5e9":"#1e293b"}`,color:classFilter===c?"#fff":"#94a3b8",borderRadius:"20px",padding:"5px 14px",fontSize:"0.78rem",cursor:"pointer",fontWeight:classFilter===c?600:400}}>
              {c}
            </button>
          ))}
        </div>
      </div>
      <div style={{fontSize:"0.8rem",color:"#475569",marginBottom:"16px"}}>{filtered.length} medication{filtered.length!==1?"s":""}</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:"12px"}}>
        {filtered.map(med=>(
          <div key={med.id} onClick={()=>setSelected(med)}
            style={{background:"#0a0e17",border:"1px solid #1e293b",borderRadius:"12px",padding:"16px",cursor:"pointer",transition:"border-color 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#0ea5e9"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#1e293b"}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
              <div>
                <div style={{color:"#e2e8f0",fontWeight:700,fontSize:"1rem"}}>{med.name}</div>
                <div style={{color:"#64748b",fontSize:"0.78rem"}}>{med.brand}</div>
              </div>
              <span style={{background:"#0ea5e920",border:"1px solid #0ea5e940",color:"#38bdf8",borderRadius:"6px",padding:"2px 8px",fontSize:"0.7rem",whiteSpace:"nowrap"}}>{med.class}</span>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginTop:"10px"}}>
              {med.fdaUses.slice(0,3).map(use=>(<span key={use} style={{background:"#16213a",color:"#94a3b8",borderRadius:"4px",padding:"2px 7px",fontSize:"0.7rem"}}>{use}</span>))}
              {med.fdaUses.length>3&&<span style={{color:"#475569",fontSize:"0.7rem",padding:"2px 4px"}}>+{med.fdaUses.length-3} more</span>}
            </div>
          </div>
        ))}
      </div>
      {selected&&<MedCard med={selected} onClose={()=>setSelected(null)}/>}
    </div>
  );
}

function QuestionnaireRunner({ q, onBack }) {
  const [answers, setAnswers] = useState({});
  const [done, setDone] = useState(false);
  const total = Object.values(answers).reduce((s,v)=>s+v,0);
  const allAnswered = q.questions.length===Object.keys(answers).length;
  const band = q.scoring.find(s=>total>=s.range[0]&&total<=s.range[1]);
  const bandColor = (label)=>{
    if(!label)return"#64748b";
    if(label.toLowerCase().includes("severe")||label.toLowerCase().includes("depend")||label.toLowerCase().includes("positive"))return"#f87171";
    if(label.toLowerCase().includes("moderate"))return"#f59e0b";
    if(label.toLowerCase().includes("mild"))return"#fde68a";
    return"#22c55e";
  };
  return (
    <div>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#38bdf8",cursor:"pointer",fontSize:"0.875rem",marginBottom:"24px",display:"flex",alignItems:"center",gap:"6px",padding:0}}>← Back to questionnaires</button>
      <h2 style={{color:"#e2e8f0",fontSize:"1.3rem",fontWeight:700,marginBottom:"4px"}}>{q.name} — {q.fullName}</h2>
      <div style={{color:"#64748b",fontSize:"0.85rem",marginBottom:"8px"}}>Target: {q.target} · Timeframe: {q.timeframe}</div>
      {q.note&&<div style={{background:"#0a0e17",border:"1px solid #1e2d45",borderRadius:"8px",padding:"12px",marginBottom:"24px",color:"#94a3b8",fontSize:"0.82rem",lineHeight:1.6}}>ℹ {q.note}</div>}
      {!done?(
        <div>
          {q.questions.map((question,i)=>(
            <div key={i} style={{background:"#0a0e17",border:`1px solid ${answers[i]!==undefined?"#1e3a5f":"#1e293b"}`,borderRadius:"10px",padding:"16px",marginBottom:"12px"}}>
              <div style={{color:"#cbd5e1",fontSize:"0.88rem",marginBottom:"14px",lineHeight:1.6}}>
                <span style={{color:"#38bdf8",fontWeight:700,marginRight:"8px"}}>{i+1}.</span>{question}
              </div>
              <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                {q.options.map((opt,j)=>(
                  <button key={j} onClick={()=>setAnswers(prev=>({...prev,[i]:q.optionValues[j]}))}
                    style={{background:answers[i]===q.optionValues[j]?"#0ea5e9":"#0f1724",border:`1px solid ${answers[i]===q.optionValues[j]?"#0ea5e9":"#2d3748"}`,color:answers[i]===q.optionValues[j]?"#fff":"#94a3b8",borderRadius:"8px",padding:"6px 12px",fontSize:"0.78rem",cursor:"pointer"}}>
                    {opt}
                  </button>
                ))}
              </div>
            </div>
          ))}
          {allAnswered&&<button onClick={()=>setDone(true)} style={{width:"100%",background:"#0ea5e9",border:"none",color:"#fff",borderRadius:"10px",padding:"14px",fontSize:"1rem",fontWeight:700,cursor:"pointer",marginTop:"8px"}}>View Score & Interpretation</button>}
        </div>
      ):(
        <div>
          <div style={{background:"#0a0e17",border:`2px solid ${bandColor(band?.label)}40`,borderRadius:"16px",padding:"32px",textAlign:"center",marginBottom:"24px"}}>
            <div style={{color:"#64748b",fontSize:"0.8rem",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:"8px"}}>Total Score</div>

function FDAModule() {
  const [search, setSearch] = useState("");
  const [view, setView] = useState("diagnosis");
  const [expanded, setExpanded] = useState({});
  const toggle=(key)=>setExpanded(prev=>({...prev,[key]:!prev[key]}));
  const filteredDiag = useMemo(()=>{
    const q=search.toLowerCase();
    if(!q)return FDA_INDICATIONS;
    const result={};
    Object.entries(FDA_INDICATIONS).forEach(([diag,meds])=>{
      if(diag.toLowerCase().includes(q)||meds.some(m=>m.toLowerCase().includes(q)))result[diag]=meds;
    });
    return result;
  },[search]);
  const byMed = useMemo(()=>{
    const result={};
    Object.entries(FDA_INDICATIONS).forEach(([diag,meds])=>{
      meds.forEach(med=>{if(!result[med])result[med]=[];result[med].push(diag);});
    });
    return result;
  },[]);
  const filteredMed = useMemo(()=>{
    const q=search.toLowerCase();
    if(!q)return byMed;
    const result={};
    Object.entries(byMed).forEach(([med,diags])=>{
      if(med.toLowerCase().includes(q)||diags.some(d=>d.toLowerCase().includes(q)))result[med]=diags;
    });
    return result;
  },[search,byMed]);
  return (
    <div>
      <div style={{display:"flex",gap:"12px",marginBottom:"16px",flexWrap:"wrap"}}>
        <div style={{position:"relative",flex:1,minWidth:"200px"}}>
          <div style={{position:"absolute",left:"14px",top:"50%",transform:"translateY(-50%)",color:"#475569"}}><SearchIcon/></div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search diagnosis or medication..."
            style={{width:"100%",background:"#0a0e17",border:"1px solid #1e293b",borderRadius:"10px",padding:"11px 12px 11px 44px",color:"#e2e8f0",fontSize:"0.875rem",outline:"none",boxSizing:"border-box"}}/>
        </div>
        <div style={{display:"flex",background:"#0a0e17",border:"1px solid #1e293b",borderRadius:"10px",overflow:"hidden"}}>
          {["diagnosis","medication"].map(v=>(
            <button key={v} onClick={()=>setView(v)}
              style={{background:view===v?"#0ea5e9":"transparent",border:"none",color:view===v?"#fff":"#64748b",padding:"11px 18px",cursor:"pointer",fontSize:"0.82rem",fontWeight:view===v?700:400,textTransform:"capitalize"}}>
              By {v}
            </button>
          ))}
        </div>
      </div>
      {view==="diagnosis"?Object.entries(filteredDiag).map(([diag,meds])=>(
        <div key={diag} style={{background:"#0a0e17",border:"1px solid #1e293b",borderRadius:"12px",marginBottom:"10px",overflow:"hidden"}}>
          <div onClick={()=>toggle(diag)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",cursor:"pointer"}}>
            <span style={{color:"#e2e8f0",fontWeight:600,fontSize:"0.9rem"}}>{diag}</span>
            <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
              <span style={{color:"#475569",fontSize:"0.78rem"}}>{meds.length} agents</span>
              <div style={{color:"#475569",transform:expanded[diag]?"rotate(180deg)":"none",transition:"transform 0.2s"}}><ChevronDown/></div>
            </div>
          </div>
          {expanded[diag]&&<div style={{padding:"0 20px 16px",display:"flex",flexWrap:"wrap",gap:"6px"}}>
            {meds.map(med=>(<span key={med} style={{background:"#0ea5e915",border:"1px solid #0ea5e930",color:"#7dd3fc",borderRadius:"6px",padding:"4px 12px",fontSize:"0.8rem"}}>{med}</span>))}
          </div>}
        </div>
      )):Object.entries(filteredMed).sort(([a],[b])=>a.localeCompare(b)).map(([med,diags])=>(
        <div key={med} style={{background:"#0a0e17",border:"1px solid #1e293b",borderRadius:"12px",marginBottom:"10px",overflow:"hidden"}}>
          <div onClick={()=>toggle(med)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",cursor:"pointer"}}>
            <span style={{color:"#e2e8f0",fontWeight:600,fontSize:"0.9rem"}}>{med}</span>
            <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
              <span style={{color:"#475569",fontSize:"0.78rem"}}>{diags.length} indication{diags.length!==1?"s":""}</span>
              <div style={{color:"#475569",transform:expanded[med]?"rotate(180deg)":"none",transition:"transform 0.2s"}}><ChevronDown/></div>
            </div>
          </div>
          {expanded[med]&&<div style={{padding:"0 20px 16px",display:"flex",flexWrap:"wrap",gap:"6px"}}>
            {diags.map(d=>(<span key={d} style={{background:"#16213a",color:"#94a3b8",borderRadius:"6px",padding:"4px 12px",fontSize:"0.8rem"}}>{d}</span>))}
          </div>}
        </div>
      ))}
    </div>
  );
}

const NOTES_KEY = "psychref_notes_v1";
const NOTES_CATEGORIES = ["Clinical Pearl","Drug Interaction","Dosing Note","Patient Tip","Red Flag","Protocol Update","Personal Reminder","Case Insight"];
const CAT_COLORS = {"Clinical Pearl":"#38bdf8","Drug Interaction":"#f87171","Dosing Note":"#a78bfa","Patient Tip":"#22c55e","Red Flag":"#ef4444","Protocol Update":"#f59e0b","Personal Reminder":"#64748b","Case Insight":"#34d399"};

function loadNotes() {
  try { return JSON.parse(localStorage.getItem(NOTES_KEY)||"[]"); } catch { return []; }
}
function saveNotes(notes) {
  try { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); } catch {}
}

function NotesModule() {
  const [notes, setNotes] = useState(()=>loadNotes());
  const [view, setView] = useState("list"); // list | new | detail
  const [selected, setSelected] = useState(null);
  const [search, setSearch] = useState("");
  const [catFilter, setCatFilter] = useState("All");
  const [form, setForm] = useState({title:"",category:"Clinical Pearl",tags:"",body:"",ref:""});
  const [editId, setEditId] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);

  const persist = (updated) => { setNotes(updated); saveNotes(updated); };

  const handleSave = () => {
    if(!form.title.trim()||!form.body.trim())return;
    const tags = form.tags.split(",").map(t=>t.trim()).filter(Boolean);
    if(editId!==null){
      const updated = notes.map(n=>n.id===editId?{...n,...form,tags,updated:new Date().toISOString()}:n);
      persist(updated); setView("list"); setEditId(null);
    } else {
      const newNote = {id:Date.now(),title:form.title,category:form.category,tags,body:form.body,ref:form.ref,created:new Date().toISOString(),updated:new Date().toISOString()};
      persist([newNote,...notes]); setView("list");
    }
    setForm({title:"",category:"Clinical Pearl",tags:"",body:"",ref:""});
  };

  const handleEdit = (note) => {
    setForm({title:note.title,category:note.category,tags:note.tags.join(", "),body:note.body,ref:note.ref||""});
    setEditId(note.id); setView("new");
  };

  const handleDelete = (id) => {
    persist(notes.filter(n=>n.id!==id));
    setConfirmDelete(null); setView("list"); setSelected(null);
  };

  const filtered = useMemo(()=>{
    const q=search.toLowerCase();
    return notes.filter(n=>{
      const matchCat=catFilter==="All"||n.category===catFilter;
      const matchSearch=!q||n.title.toLowerCase().includes(q)||n.body.toLowerCase().includes(q)||n.tags.some(t=>t.toLowerCase().includes(q));
      return matchCat&&matchSearch;
    });

  const fmtDate = (iso) => {
    const d = new Date(iso);

  if(view==="new") return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"24px"}}>
        <h2 style={{color:"#e2e8f0",fontSize:"1.2rem",fontWeight:700,margin:0}}>{editId!==null?"Edit Note":"New Note"}</h2>
        <button onClick={()=>{setView("list");setEditId(null);setForm({title:"",category:"Clinical Pearl",tags:"",body:"",ref:""}); }} style={{background:"#1e293b",border:"none",color:"#94a3b8",borderRadius:"8px",padding:"8px 14px",cursor:"pointer",fontSize:"0.82rem"}}>Cancel</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"14px"}}>
        <div>
          <label style={{color:"#64748b",fontSize:"0.75rem",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:"6px"}}>Title *</label>
          <input value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} placeholder="e.g. Lithium + NSAID interaction pearl" style={inputStyle}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
          <div>
            <label style={{color:"#64748b",fontSize:"0.75rem",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:"6px"}}>Category</label>
            <select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}
              style={{...inputStyle,appearance:"none",cursor:"pointer"}}>
              {NOTES_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <label style={{color:"#64748b",fontSize:"0.75rem",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:"6px"}}>Tags (comma-separated)</label>
            <input value={form.tags} onChange={e=>setForm(p=>({...p,tags:e.target.value}))} placeholder="lithium, renal, elderly" style={inputStyle}/>
          </div>
        </div>
        <div>
          <label style={{color:"#64748b",fontSize:"0.75rem",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:"6px"}}>Note / Content *</label>
          <textarea value={form.body} onChange={e=>setForm(p=>({...p,body:e.target.value}))} placeholder="Write your clinical pearl, observation, protocol note, or reminder here..."
            rows={8} style={{...inputStyle,resize:"vertical",lineHeight:1.7}}/>
        </div>
        <div>
          <label style={{color:"#64748b",fontSize:"0.75rem",textTransform:"uppercase",letterSpacing:"0.08em",display:"block",marginBottom:"6px"}}>Reference / Source (optional)</label>
          <input value={form.ref} onChange={e=>setForm(p=>({...p,ref:e.target.value}))} placeholder="e.g. APA Practice Guideline 2023, Stahl's, case from 6/2025" style={inputStyle}/>
        </div>
        <div style={{display:"flex",gap:"10px",paddingTop:"4px"}}>
          <button onClick={handleSave} disabled={!form.title.trim()||!form.body.trim()}
            style={{background:form.title.trim()&&form.body.trim()?"#0ea5e9":"#1e293b",border:"none",color:form.title.trim()&&form.body.trim()?"#fff":"#475569",borderRadius:"10px",padding:"12px 28px",cursor:form.title.trim()&&form.body.trim()?"pointer":"not-allowed",fontSize:"0.9rem",fontWeight:700}}>
            {editId!==null?"Save Changes":"Save Note"}
          </button>
        </div>
      </div>
    </div>
  );

  if(view==="detail"&&selected) {
    const note = notes.find(n=>n.id===selected);
    if(!note){setView("list");return null;}
    const catColor = CAT_COLORS[note.category]||"#64748b";
    return (
      <div>
        <button onClick={()=>setView("list")} style={{background:"none",border:"none",color:"#38bdf8",cursor:"pointer",fontSize:"0.875rem",marginBottom:"24px",display:"flex",alignItems:"center",gap:"6px",padding:0}}>← Back to notes</button>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"16px",flexWrap:"wrap",gap:"10px"}}>

            <h2 style={{color:"#e2e8f0",fontSize:"1.25rem",fontWeight:700,margin:"0 0 8px 0"}}>{note.title}</h2>
            <div style={{display:"flex",gap:"8px",flexWrap:"wrap",alignItems:"center"}}>
              <span style={{background:`${catColor}20`,border:`1px solid ${catColor}40`,color:catColor,borderRadius:"6px",padding:"3px 10px",fontSize:"0.75rem",fontWeight:600}}>{note.category}</span>
              {note.tags.map(t=>(<span key={t} style={{background:"#1e293b",color:"#64748b",borderRadius:"5px",padding:"2px 8px",fontSize:"0.72rem"}}>#{t}</span>))}
            </div>
          </div>
          <div style={{display:"flex",gap:"8px"}}>
            <button onClick={()=>handleEdit(note)} style={{background:"#1e293b",border:"none",color:"#94a3b8",borderRadius:"8px",padding:"8px 14px",cursor:"pointer",fontSize:"0.82rem"}}>Edit</button>
            <button onClick={()=>setConfirmDelete(note.id)} style={{background:"#2a0a0a",border:"1px solid #7f1d1d40",color:"#f87171",borderRadius:"8px",padding:"8px 14px",cursor:"pointer",fontSize:"0.82rem"}}>Delete</button>
          </div>
        </div>
        <div style={{background:"#0a0e17",border:"1px solid #1e293b",borderRadius:"12px",padding:"24px",marginBottom:"16px",color:"#cbd5e1",fontSize:"0.9rem",lineHeight:1.85,whiteSpace:"pre-wrap"}}>
          {note.body}
        </div>
        {note.ref&&<div style={{background:"#070b14",border:"1px solid #1e293b",borderRadius:"8px",padding:"12px 16px",marginBottom:"16px"}}>
          <span style={{color:"#475569",fontSize:"0.75rem",textTransform:"uppercase",letterSpacing:"0.08em"}}>Source / Reference: </span>
          <span style={{color:"#64748b",fontSize:"0.82rem"}}>{note.ref}</span>
        </div>}
        <div style={{color:"#334155",fontSize:"0.75rem"}}>Created {fmtDate(note.created)} · Last updated {fmtDate(note.updated)}</div>
        {confirmDelete&&(
          <div style={{position:"fixed",inset:0,background:"rgba(10,14,23,0.9)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
            <div style={{background:"#0f1724",border:"1px solid #7f1d1d",borderRadius:"14px",padding:"28px",maxWidth:"380px",width:"100%",textAlign:"center"}}>

              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px",flexWrap:"wrap",gap:"12px"}}>
        <div>
          <h2 style={{color:"#e2e8f0",fontSize:"1.1rem",fontWeight:700,margin:"0 0 2px 0"}}>Personal Notes</h2>

      </div>

      <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"20px"}}>
        {["All",...NOTES_CATEGORIES].map(c=>{
          const col = CAT_COLORS[c]||"#0ea5e9";

          return (
            <button key={c} onClick={()=>setCatFilter(c)}
              style={{background:active?`${col}20`:"#0a0e17",border:`1px solid ${active?col+"50":"#1e293b"}`,color:active?col:"#64748b",borderRadius:"20px",padding:"4px 12px",fontSize:"0.75rem",cursor:"pointer",fontWeight:active?600:400}}>
              {c}
            </button>
          );
        })}
      </div>

      {filtered.length===0&&(
        <div style={{textAlign:"center",padding:"60px 20px",color:"#334155"}}>
          <div style={{fontSize:"2rem",marginBottom:"12px"}}>📝</div>
          <div style={{fontSize:"0.9rem",color:"#475569",marginBottom:"6px"}}>{notes.length===0?"No notes yet — add your first clinical pearl":"No notes match your search"}</div>
          {notes.length===0&&<div style={{fontSize:"0.8rem",color:"#334155"}}>Notes are saved locally in this browser across sessions.</div>}

      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:"12px"}}>
        {filtered.map(note=>{
          const col = CAT_COLORS[note.category]||"#64748b";
          return (
            <div key={note.id} onClick={()=>{setSelected(note.id);setView("detail");}}
              style={{background:"#0a0e17",border:`1px solid #1e293b`,borderLeft:`3px solid ${col}`,borderRadius:"12px",padding:"16px",cursor:"pointer",transition:"border-color 0.15s"}}

              onMouseLeave={e=>e.currentTarget.style.borderColor="#1e293b"}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
                <div style={{color:col,fontSize:"0.7rem",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em"}}>{note.category}</div>
                <div style={{color:"#334155",fontSize:"0.7rem"}}>{fmtDate(note.updated)}</div>
              </div>
              <div style={{color:"#e2e8f0",fontWeight:600,fontSize:"0.9rem",marginBottom:"8px",lineHeight:1.4}}>{note.title}</div>
              <div style={{color:"#64748b",fontSize:"0.8rem",lineHeight:1.6,marginBottom:"10px",overflow:"hidden",display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical"}}>{note.body}</div>
              {note.tags.length>0&&<div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
                {note.tags.slice(0,3).map(t=>(<span key={t} style={{background:"#1e293b",color:"#475569",borderRadius:"4px",padding:"1px 6px",fontSize:"0.68rem"}}>#{t}</span>))}
                {note.tags.length>3&&<span style={{color:"#334155",fontSize:"0.68rem",padding:"1px 4px"}}>+{note.tags.length-3}</span>}
              </div>}
            </div>
          );
        })}
      </div>
      {notes.length>0&&<div style={{marginTop:"20px",color:"#334155",fontSize:"0.75rem",textAlign:"center"}}>{notes.length} note{notes.length!==1?"s":""} · Stored locally in this browser</div>}
    </div>
  );
}

// ─── AUGMENTATION MODULE ──────────────────────────────────────────────────────
function AugDetail({ dx, onBack }) {
  const [openStep, setOpenStep] = useState(0);
  const [openOpt, setOpenOpt] = useState({});
  const toggleOpt = (si, oi) => setOpenOpt(p => ({...p, [`${si}-${oi}`]: !p[`${si}-${oi}`]}));
  const evColor = (ev) => {
    if(!ev) return "#475569";
    if(ev.includes("FDA-approved")) return "#22c55e";
    if(ev.includes("Level A")) return "#22c55e";
    if(ev.includes("Level B")) return "#38bdf8";
    if(ev.includes("Level C")) return "#f59e0b";
    if(ev.includes("Clinical imperative")) return "#a78bfa";
    if(ev.includes("First-line")) return "#22c55e";
    return "#475569";
  };
  return (
    <div>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#38bdf8",cursor:"pointer",fontSize:"0.875rem",marginBottom:"24px",display:"flex",alignItems:"center",gap:"6px",padding:0}}>← Back</button>
      <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"20px",flexWrap:"wrap"}}>
        <h2 style={{color:"#e2e8f0",fontSize:"1.25rem",fontWeight:700,margin:0}}>{dx.diagnosis}</h2>
        <span style={{background:`${dx.color}20`,border:`1px solid ${dx.color}40`,color:dx.color,borderRadius:"6px",padding:"3px 10px",fontSize:"0.75rem",fontWeight:600}}>Augmentation Guide</span>
      </div>
      {dx.stages.map((stage, si) => (
        <div key={si} style={{marginBottom:"12px",background:"#0a0e17",border:`1px solid ${openStep===si?dx.color+"60":"#1e293b"}`,borderRadius:"12px",overflow:"hidden"}}>
          <div onClick={()=>setOpenStep(openStep===si?-1:si)} style={{padding:"16px 20px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{color:openStep===si?dx.color:"#e2e8f0",fontWeight:700,fontSize:"0.9rem"}}>{stage.step}</div>
              <div style={{color:"#475569",fontSize:"0.78rem",marginTop:"3px"}}>{stage.options.length} option{stage.options.length!==1?"s":""}</div>
            </div>
            <div style={{color:"#475569",transform:openStep===si?"rotate(180deg)":"none",transition:"transform 0.2s"}}>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
          {openStep===si&&(
            <div style={{padding:"0 20px 16px"}}>
              <div style={{color:"#64748b",fontSize:"0.8rem",lineHeight:1.6,marginBottom:"14px",borderTop:"1px solid #1e293b",paddingTop:"12px"}}>{stage.rationale}</div>
              {stage.options.map((opt, oi) => {
                const key=`${si}-${oi}`;
                return (
                  <div key={oi} style={{background:"#070b14",border:"1px solid #1e293b",borderRadius:"10px",marginBottom:"8px",overflow:"hidden"}}>
                    <div onClick={()=>toggleOpt(si,oi)} style={{padding:"12px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"10px",flex:1,flexWrap:"wrap"}}>
                        <span style={{color:"#e2e8f0",fontWeight:600,fontSize:"0.875rem"}}>{opt.name}</span>
                        {opt.evidence&&<span style={{background:`${evColor(opt.evidence)}15`,border:`1px solid ${evColor(opt.evidence)}30`,color:evColor(opt.evidence),borderRadius:"4px",padding:"1px 8px",fontSize:"0.68rem",fontWeight:600,whiteSpace:"nowrap"}}>{opt.evidence}</span>}
                      </div>
                      <div style={{color:"#475569",marginLeft:"8px",flexShrink:0}}>
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points={openOpt[key]?"18 15 12 9 6 15":"6 9 12 15 18 9"}/></svg>
                      </div>
                    </div>
                    {openOpt[key]&&(
                      <div style={{padding:"0 16px 14px",borderTop:"1px solid #1e293b"}}>
                        <div style={{color:"#cbd5e1",fontSize:"0.83rem",lineHeight:1.7,marginTop:"10px"}}>{opt.detail}</div>
                        {opt.caution&&<div style={{background:"#1a1200",border:"1px solid #78350f40",borderRadius:"8px",padding:"10px 12px",marginTop:"10px",color:"#fcd34d",fontSize:"0.78rem",lineHeight:1.6}}>⚠ {opt.caution}</div>}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function CompareDetail({ table, onBack }) {
  return (
    <div>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#38bdf8",cursor:"pointer",fontSize:"0.875rem",marginBottom:"24px",display:"flex",alignItems:"center",gap:"6px",padding:0}}>← Back</button>
      <h2 style={{color:"#e2e8f0",fontSize:"1.25rem",fontWeight:700,marginBottom:"6px"}}>{table.name}</h2>
      <div style={{color:"#64748b",fontSize:"0.83rem",lineHeight:1.6,marginBottom:"20px"}}>{table.description}</div>
      <div style={{overflowX:"auto",marginBottom:"16px"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:"600px"}}>
          <thead>
            <tr>
              {table.columns.map((col,i)=>(
                <th key={i} style={{background:i===0?"#0a0e17":`${table.color}15`,color:i===0?"#475569":table.color,padding:"10px 14px",fontSize:"0.75rem",fontWeight:700,textAlign:"left",borderBottom:"1px solid #1e293b",whiteSpace:"nowrap"}}>{col}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {table.rows.map((row,ri)=>(
              <tr key={ri} style={{background:ri%2===0?"#070b14":"#0a0e17"}}>
                <td style={{padding:"10px 14px",color:"#94a3b8",fontSize:"0.8rem",fontWeight:600,borderBottom:"1px solid #1e293b10",whiteSpace:"nowrap",verticalAlign:"top"}}>{row.property}</td>
                {row.values.map((val,vi)=>{
                  const isDanger=val&&(val.includes("Highest")||val.includes("Worst")||val.includes("Most +")||val.includes("CONTRAINDICATED")||val.includes("+++"));
                  const isGood=val&&(val.includes("Best")||val.includes("Minimal")||val.includes("Low")||val==="None"||val.includes("Neutral")||val.includes("Lowest"));
                  return <td key={vi} style={{padding:"10px 14px",color:isDanger?"#f87171":isGood?"#86efac":"#cbd5e1",fontSize:"0.78rem",borderBottom:"1px solid #1e293b10",verticalAlign:"top",lineHeight:1.5}}>{val}</td>;
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {table.footnotes&&table.footnotes.length>0&&(
        <div style={{background:"#0a0e17",border:"1px solid #1e293b",borderRadius:"10px",padding:"14px 16px"}}>
          {table.footnotes.map((fn,i)=>(
            <div key={i} style={{color:"#64748b",fontSize:"0.78rem",lineHeight:1.6,marginBottom:i<table.footnotes.length-1?"8px":0}}>* {fn}</div>
          ))}
        </div>
      )}
    </div>
  );
}

}

function TapersModule() {
  const [active, setActive] = useState(null);
  if(active) return <TaperDetail protocol={active} onBack={()=>setActive(null)}/>;
  return (
    <div>
      <div style={{background:"#1a0a0a",border:"1px solid #7f1d1d30",borderRadius:"10px",padding:"12px 16px",marginBottom:"20px",color:"#fca5a5",fontSize:"0.82rem",lineHeight:1.6}}>
        ⚠ Taper protocols are guides — individualize based on dose, duration, and patient history. Never abruptly discontinue benzodiazepines or antipsychotics in dependent patients.
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:"12px"}}>
        {TAPER_PROTOCOLS.map(p=>(
          <div key={p.id} onClick={()=>setActive(p)}
            style={{background:"#0a0e17",border:"1px solid #1e293b",borderRadius:"12px",padding:"20px",cursor:"pointer",transition:"border-color 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=p.color}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#1e293b"}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"10px"}}>
              <div style={{color:p.color,fontWeight:700,fontSize:"1rem"}}>{p.name}</div>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
            <div style={{color:"#94a3b8",fontSize:"0.79rem",lineHeight:1.6,marginBottom:"12px"}}>{p.indication}</div>
            <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
              <span style={{background:`${p.color}15`,border:`1px solid ${p.color}30`,color:p.color,borderRadius:"5px",padding:"2px 8px",fontSize:"0.7rem"}}>{p.protocol.length} protocol steps</span>
              <span style={{background:"#1e293b",color:"#64748b",borderRadius:"5px",padding:"2px 8px",fontSize:"0.7rem"}}>{p.riskByAgent.length} agents profiled</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

                ))}
              </ol>
            )}
            {section.bullets&&(
              <ul style={{paddingLeft:"20px",margin:"0 0 8px 0"}}>
                {section.bullets.map((b,j)=>(
                  <li key={j} style={{color:"#334155",fontSize:"0.87rem",lineHeight:1.8,marginBottom:"5px"}}>{b}</li>

          <div style={{color:"#94a3b8",fontSize:"0.72rem"}}>

            <em>Educational handout only — not a substitute for your individualized treatment plan. Discuss questions with your provider.</em>
          </div>
        </div>

        <div style={{marginTop:"16px",display:"flex",gap:"10px"}}>

            style={{background:catColor,border:"none",color:"#fff",borderRadius:"8px",padding:"10px 20px",cursor:"pointer",fontWeight:700,fontSize:"0.875rem",fontFamily:"inherit"}}>

        </div>
      </div>
    </div>
  );
}

function HandoutsModule() {
  const [preview, setPreview] = useState(null);
  const [search, setSearch] = useState("");
  const [catFilter, setCatFilter] = useState("All");

  const categories = ["All", ...Array.from(new Set(HANDOUTS.map(h=>h.category)))];

  const filtered = useMemo(()=>{
    const q = search.toLowerCase();
    return HANDOUTS.filter(h=>{
      const matchCat = catFilter==="All"||h.category===catFilter;
      const matchSearch = !q||h.title.toLowerCase().includes(q)||h.category.toLowerCase().includes(q)||h.subtitle.toLowerCase().includes(q);
      return matchCat&&matchSearch;
    });
  },[search,catFilter]);

  const catColors = {"Breathing Exercises":"#38bdf8","Grounding Techniques":"#34d399","Relaxation":"#a78bfa","CBT Tools":"#818cf8","Psychoeducation":"#f59e0b","Medication Education":"#22c55e"};

  return (
    <div>
      {preview&&<HandoutPrint handout={preview} onClose={()=>setPreview(null)}/>}

      <div style={{background:"#0a1a0a",border:"1px solid #14532d40",borderRadius:"10px",padding:"12px 16px",marginBottom:"20px",color:"#86efac",fontSize:"0.82rem",lineHeight:1.6}}>
        🖨 Click any handout to preview and print. Each is formatted for a clean single-page printout. Use browser Print → Save as PDF to send digitally. All handouts include your name and practice information.

      <div style={{display:"flex",gap:"10px",marginBottom:"14px",flexWrap:"wrap"}}>
        <div style={{position:"relative",flex:1,minWidth:"200px"}}>
          <div style={{position:"absolute",left:"14px",top:"50%",transform:"translateY(-50%)",color:"#475569"}}>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search handouts..."
            style={{width:"100%",background:"#0a0e17",border:"1px solid #1e293b",borderRadius:"10px",padding:"10px 10px 10px 40px",color:"#e2e8f0",fontSize:"0.875rem",outline:"none",boxSizing:"border-box"}}/>
        </div>
      </div>

      <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"20px"}}>
        {categories.map(c=>{
          const col = catColors[c]||"#0ea5e9";
          const active = catFilter===c;
          return (
            <button key={c} onClick={()=>setCatFilter(c)}
              style={{background:active?`${col}20`:"#0a0e17",border:`1px solid ${active?col+"50":"#1e293b"}`,color:active?col:"#64748b",borderRadius:"20px",padding:"5px 14px",fontSize:"0.75rem",cursor:"pointer",fontWeight:active?600:400}}>
              {c}
            </button>
          );
        })}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:"12px"}}>
        {filtered.map(h=>{
          const col = catColors[h.category]||"#64748b";
          return (
            <div key={h.id} onClick={()=>setPreview(h)}
              style={{background:"#0a0e17",border:"1px solid #1e293b",borderLeft:`3px solid ${col}`,borderRadius:"12px",padding:"18px",cursor:"pointer",transition:"border-color 0.15s"}}

              <div style={{color:col,fontSize:"0.7rem",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"6px"}}>{h.category}</div>
              <div style={{color:"#e2e8f0",fontWeight:700,fontSize:"0.95rem",marginBottom:"5px"}}>{h.title}</div>
              <div style={{color:"#64748b",fontSize:"0.78rem",lineHeight:1.5,marginBottom:"12px"}}>{h.subtitle}</div>
              <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                <span style={{background:`${col}15`,border:`1px solid ${col}30`,color:col,borderRadius:"5px",padding:"2px 8px",fontSize:"0.7rem"}}>🖨 Preview & Print</span>
                <span style={{color:"#334155",fontSize:"0.7rem"}}>{h.sections.length} sections</span>
              </div>
            </div>
          );
        })}
      </div>

      <style>{`
        @media print {
          body * { visibility: hidden; }
          .psychref-print, .psychref-print * { visibility: visible; }
          .psychref-print { position: absolute; left: 0; top: 0; width: 100%; }
        }
      `}</style>
    </div>
  );
}

// ─── OPENFDA DRUG LOOKUP ──────────────────────────────────────────────────────

function FDALookup() {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [selected, setSelected] = useState(null);

  const search = async () => {
    if(!query.trim()) return;
    setLoading(true); setError(null); setResults(null); setSelected(null);
    try {
      const encoded = encodeURIComponent(query.trim());
      const url = `https://api.fda.gov/drug/label.json?search=openfda.brand_name:"${encoded}"+openfda.generic_name:"${encoded}"&limit=5`;
      const res = await fetch(url);
      if(!res.ok) {
        // Try broader search
        const url2 = `https://api.fda.gov/drug/label.json?search=(openfda.brand_name:${encoded}+openfda.generic_name:${encoded})&limit=5`;
        const res2 = await fetch(url2);
        if(!res2.ok) throw new Error("No results found for that drug name.");
        const data2 = await res2.json();
        if(!data2.results||data2.results.length===0) throw new Error("No FDA label found for that drug name.");
        setResults(data2.results);
      } else {
        const data = await res.json();
        if(!data.results||data.results.length===0) throw new Error("No FDA label found for that drug name.");
        setResults(data.results);
      }
    } catch(e) {
      setError(e.message||"FDA API error. Check the drug name and try again.");
    }
    setLoading(false);
  };

  const handleKey = (e) => { if(e.key==="Enter") search(); };

  const getField = (result, ...fields) => {
    for(const f of fields) {
      if(result[f]&&result[f].length>0) return result[f][0];
    }
    return null;
  };

  const clean = (text) => {
    if(!text) return null;
    return text.replace(/\s+/g," ").trim().slice(0, 2000) + (text.length > 2000 ? "..." : "");
  };

  return (
    <div>
      <div style={{background:"#0a1a10",border:"1px solid #14532d40",borderRadius:"10px",padding:"12px 16px",marginBottom:"20px",color:"#86efac",fontSize:"0.82rem",lineHeight:1.6}}>
        🔬 Live FDA drug label lookup via openFDA public API. Search any medication by brand or generic name. Data is pulled directly from current FDA labeling.
      </div>

      <div style={{display:"flex",gap:"10px",marginBottom:"20px"}}>
        <div style={{position:"relative",flex:1}}>
          <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={handleKey}
            placeholder="Enter drug name (brand or generic) — e.g. sertraline, Zoloft, lithium..."
            style={{width:"100%",background:"#0a0e17",border:"1px solid #1e293b",borderRadius:"10px",padding:"12px 14px",color:"#e2e8f0",fontSize:"0.875rem",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
        </div>
        <button onClick={search} disabled={loading||!query.trim()}
          style={{background:loading||!query.trim()?"#1e293b":"#0ea5e9",border:"none",color:loading||!query.trim()?"#475569":"#fff",borderRadius:"10px",padding:"12px 24px",cursor:loading||!query.trim()?"not-allowed":"pointer",fontWeight:700,fontSize:"0.875rem",fontFamily:"inherit",whiteSpace:"nowrap"}}>
          {loading?"Searching...":"Search FDA"}
        </button>
      </div>

      {error&&(
        <div style={{background:"#1a0505",border:"1px solid #7f1d1d40",borderRadius:"10px",padding:"14px 16px",color:"#f87171",fontSize:"0.83rem",marginBottom:"16px"}}>
          ⚠ {error}
        </div>
      )}

      {results&&!selected&&(
        <div>
          <div style={{color:"#475569",fontSize:"0.78rem",marginBottom:"12px"}}>{results.length} result{results.length!==1?"s":""} from FDA label database — click to view full label</div>
          {results.map((r,i)=>{
            const brand = r.openfda?.brand_name?.[0]||"—";
            const generic = r.openfda?.generic_name?.[0]||"—";
            const mfr = r.openfda?.manufacturer_name?.[0]||"—";
            const route = r.openfda?.route?.[0]||"—";
            return (
              <div key={i} onClick={()=>setSelected(r)}
                style={{background:"#0a0e17",border:"1px solid #1e293b",borderRadius:"10px",padding:"14px 16px",marginBottom:"8px",cursor:"pointer",transition:"border-color 0.15s"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor="#0ea5e9"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="#1e293b"}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{color:"#e2e8f0",fontWeight:700,fontSize:"0.925rem"}}>{brand}</div>
                    <div style={{color:"#64748b",fontSize:"0.78rem",marginTop:"2px"}}>{generic} · {route} · {mfr}</div>
                  </div>
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {selected&&(
        <div>
          <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",color:"#38bdf8",cursor:"pointer",fontSize:"0.875rem",marginBottom:"20px",display:"flex",alignItems:"center",gap:"6px",padding:0}}>← Back to results</button>

          <div style={{marginBottom:"20px"}}>
            <h2 style={{color:"#e2e8f0",fontSize:"1.25rem",fontWeight:700,margin:"0 0 4px 0"}}>{selected.openfda?.brand_name?.[0]||"Unknown"}</h2>
            <div style={{color:"#64748b",fontSize:"0.82rem"}}>{selected.openfda?.generic_name?.[0]} · {selected.openfda?.route?.[0]} · {selected.openfda?.manufacturer_name?.[0]}</div>
            {selected.openfda?.application_number&&<div style={{color:"#334155",fontSize:"0.75rem",marginTop:"3px"}}>FDA Application: {selected.openfda.application_number[0]}</div>}
          </div>

          <div style={{background:"#1a0505",border:"1px solid #7f1d1d30",borderRadius:"10px",padding:"12px 16px",marginBottom:"16px",color:"#fca5a5",fontSize:"0.78rem",lineHeight:1.6}}>
            ⚠ Data sourced directly from FDA label database. Verify against current prescribing information before clinical use. Labels may not reflect the most recent REMS updates.
          </div>

          {[
            ["Indications & Usage", getField(selected,"indications_and_usage")],
            ["Dosage & Administration", getField(selected,"dosage_and_administration")],
            ["Contraindications", getField(selected,"contraindications")],
            ["Warnings & Precautions", getField(selected,"warnings_and_precautions","warnings","boxed_warning")],
            ["Adverse Reactions", getField(selected,"adverse_reactions")],
            ["Drug Interactions", getField(selected,"drug_interactions")],
            ["Use in Specific Populations", getField(selected,"use_in_specific_populations")],
            ["Mechanism of Action", getField(selected,"mechanism_of_action")],
            ["Pharmacokinetics", getField(selected,"pharmacokinetics")],
          ].filter(([,val])=>val).map(([label, val])=>(
            <div key={label} style={{background:"#0a0e17",border:"1px solid #1e293b",borderRadius:"10px",marginBottom:"10px",overflow:"hidden"}}>
              <div style={{padding:"12px 16px",borderBottom:"1px solid #1e293b",color:"#38bdf8",fontWeight:700,fontSize:"0.8rem",textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
              <div style={{padding:"14px 16px",color:"#94a3b8",fontSize:"0.82rem",lineHeight:1.75,whiteSpace:"pre-wrap",maxHeight:"280px",overflowY:"auto"}}>
                {clean(val)}
              </div>
            </div>
          ))}
        </div>
      )}

      {!results&&!loading&&!error&&(
        <div style={{textAlign:"center",padding:"60px 20px",color:"#334155"}}>
          <div style={{fontSize:"2rem",marginBottom:"12px"}}>🔬</div>
          <div style={{color:"#475569",fontSize:"0.875rem",marginBottom:"6px"}}>Search any medication to pull its current FDA label</div>
          <div style={{color:"#334155",fontSize:"0.78rem"}}>Brand names, generic names, and combinations supported</div>
        </div>
      )}
    </div>
  );
}
